<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>

<body>

    <nav th:replace="fragments/navbar :: navbar"></nav>

    <div class="container mt-4">

        <h2>Edit Product</h2>

        <!-- FORM POSTS TO EDIT-PRODUCT WITH PRODUCT ID, PRE-POPULATED FROM EXISTING PRODUCT -->
        <form method="post" th:action="@{/edit-product/{id}(id=${product.id})}" th:object="${product}" class="mt-3">

            <!-- NAME -->
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" th:field="*{name}" placeholder="Product name" />
                <!-- SHOW VALIDATION ERROR -->
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" th:field="*{description}" rows="3"
                    placeholder="Product description"></textarea>
                <!-- SHOW VALIDATION ERROR -->
                <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <!-- PRICE -->
            <div class="mb-3">
                <label class="form-label">Price ($)</label>
                <input type="number" step="0.01" min="0.01" class="form-control" th:field="*{price}"
                    placeholder="0.00" />
                <!-- SHOW VALIDATION ERROR -->
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <!-- CATEGORY -->
            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" class="form-control" th:field="*{category}" placeholder="e.g. Electronics" />
                <!-- SHOW VALIDATION ERROR -->
                <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
            </div>

            <!-- IN STOCK -->
            <div class="mb-3">
                <label class="form-label">Quantity in Stock</label>
                <input type="number" min="0" class="form-control" th:field="*{inStock}" placeholder="0" />
                <!-- SHOW VALIDATION ERROR -->
                <div class="text-danger" th:if="${#fields.hasErrors('inStock')}" th:errors="*{inStock}"></div>
            </div>

            <!-- SUBMIT / CANCEL -->
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a th:href="@{/products}" class="btn btn-secondary ms-2">Cancel</a>

        </form>

    </div>

    <div th:insert="fragments/base :: assetsScripts"></div>

</body>

</html>
