<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile – Pixel Vault</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <h2 class="mb-1">My Profile</h2>
            <p class="text-muted mb-4">Logged in as: <strong th:text="${username}"></strong></p>

            <hr />

            <h5 class="mt-4 mb-3">Change Password</h5>

            <!-- SUCCESS MESSAGE -->
            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

            <!-- ERROR MESSAGE -->
            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <form method="post" th:action="@{/profile/change-password}">

                <div class="mb-3">
                    <label class="form-label" for="oldPassword">Current Password</label>
                    <input type="password" id="oldPassword" name="oldPassword"
                           class="form-control" placeholder="Enter current password" required />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword"
                           class="form-control" placeholder="At least 6 characters" required minlength="6" />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           class="form-control" placeholder="Repeat new password" required minlength="6" />
                </div>

                <button type="submit" class="btn btn-primary w-100">Update Password</button>

            </form>

            <hr class="mt-4" />

            <form method="post" th:action="@{/logout}">
                <button type="submit" class="btn btn-outline-secondary w-100">Logout</button>
            </form>

        </div>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>

</body>
</html>
