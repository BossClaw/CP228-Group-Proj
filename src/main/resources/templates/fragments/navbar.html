<nav
        th:fragment="navbar"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        class="navbar navbar-expand-lg navbar-dark bg-dark"
>
        <div class="container-fluid">
                <a
                        class="navbar-brand"
                        th:href="@{/}"
                        >Pixel Vault</a
                >
                <button
                        class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent"
                        aria-controls="navbarSupportedContent"
                        aria-expanded="false"
                        aria-label="Toggle navigation"
                >
                        <span class="navbar-toggler-icon"></span>
                </button>
                <div
                        class="collapse navbar-collapse"
                        id="navbarSupportedContent"
                >
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                                <!-- HOME LINK — AUTHENTICATED ONLY -->
                                <li class="nav-item" sec:authorize="isAuthenticated()">
                                        <a
                                                class="nav-link"
                                                aria-current="page"
                                                th:href="@{/}"
                                                >Home</a
                                        >
                                </li>

                                <!-- PRODUCTS LIST LINK — AUTHENTICATED ONLY -->
                                <li class="nav-item" sec:authorize="isAuthenticated()">
                                        <a
                                                class="nav-link"
                                                th:href="@{/products}"
                                                >Products</a
                                        >
                                </li>

                                <!-- ADD PRODUCT LINK — ADMIN ONLY -->
                                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                                        <a
                                                class="nav-link"
                                                th:href="@{/create-product}"
                                                >Add Product</a
                                        >
                                </li>

                                <!-- ADMIN DASHBOARD LINK — ADMIN ONLY -->
                                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                                        <a
                                                class="nav-link text-warning"
                                                th:href="@{/admin}"
                                                >Admin</a
                                        >
                                </li>

                        </ul>

                        <!-- GLOBAL SEARCH — AUTHENTICATED ONLY -->
                        <form
                                sec:authorize="isAuthenticated()"
                                class="d-flex me-3"
                                role="search"
                                method="get"
                                th:action="@{/products}"
                        >
                                <input
                                        class="form-control me-2"
                                        type="search"
                                        name="search"
                                        placeholder="Search products..."
                                        aria-label="Search"
                                />
                                <button class="btn btn-outline-light" type="submit">Search</button>
                        </form>

                        <!-- AUTH LINKS -->
                        <ul class="navbar-nav mb-2 mb-lg-0">

                                <!-- LOGGED-IN: show username + logout -->
                                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                                        <a class="nav-link dropdown-toggle" href="#" role="button"
                                           data-bs-toggle="dropdown" aria-expanded="false"
                                           sec:authentication="name">User</a>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                                <li>
                                                        <a class="dropdown-item" th:href="@{/profile}">My Profile</a>
                                                </li>
                                                <li><hr class="dropdown-divider" /></li>
                                                <li>
                                                        <form method="post" th:action="@{/logout}" class="d-inline">
                                                                <button type="submit" class="dropdown-item">Logout</button>
                                                        </form>
                                                </li>
                                        </ul>
                                </li>

                                <!-- ANONYMOUS: show Login + Register -->
                                <li class="nav-item" sec:authorize="isAnonymous()">
                                        <a class="nav-link" th:href="@{/login}">Login</a>
                                </li>
                                <li class="nav-item" sec:authorize="isAnonymous()">
                                        <a class="nav-link" th:href="@{/register}">Register</a>
                                </li>

                        </ul>

                </div>
        </div>
</nav>
