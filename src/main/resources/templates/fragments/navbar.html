<nav

	class="navbar navbar-expand-lg navbar-dark bg-dark"
>
	<div class="container-fluid">
		<a
			class="navbar-brand"
			th:href="@{/}"
			>Pixel Vault</a
		>
		<button
			class="navbar-toggler"
			type="button"
			data-bs-toggle="collapse"
			data-bs-target="#navbarSupportedContent"
			aria-controls="navbarSupportedContent"
			aria-expanded="false"
			aria-label="Toggle navigation"
		>
			<span class="navbar-toggler-icon"></span>
		</button>
		<div
			class="collapse navbar-collapse"
			id="navbarSupportedContent"
		>
			<ul class="navbar-nav me-auto mb-2 mb-lg-0">
				<!-- HOME LINK -->
				<li class="nav-item">
					<a
						class="nav-link"
						aria-current="page"
						th:href="@{/}"
						>Home</a
					>
				</li>

				<!-- PRODUCTS LIST LINK -->
				<li class="nav-item">
					<a
						class="nav-link"
						th:href="@{/products}"
						>Products</a
					>
				</li>

				<!-- ADD PRODUCT LINK -->
				<li class="nav-item">
					<a
						class="nav-link"
						th:href="@{/create-product}"
						>Add Product</a
					>
				</li>
			</ul>

			<!-- GLOBAL SEARCH — ROUTES TO PRODUCTS PAGE -->
			<form
				class="d-flex"
				role="search"
				method="get"
				th:action="@{/products}"
			>
				<input
					class="form-control me-2"
					type="search"
					name="search"
					placeholder="Search products..."
					aria-label="Search"
				/>
				<button class="btn btn-outline-light" type="submit">Search</button>
			</form>
		</div>
