<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login – Pixel Vault</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <h2 class="mb-4 text-center">Login</h2>

            <!-- REGISTERED SUCCESS MESSAGE -->
            <div class="alert alert-success" th:if="${param.registered}">
                Registration successful! Please log in.
            </div>

            <!-- INVALID CREDENTIALS ERROR -->
            <div class="alert alert-danger" th:if="${param.error}">
                Invalid username or password.
            </div>

            <!-- LOGOUT SUCCESS MESSAGE -->
            <div class="alert alert-info" th:if="${param.logout}">
                You have been logged out.
            </div>

            <!-- LOGIN FORM — Spring Security handles POST /login -->
            <form method="post" th:action="@{/login}">

                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="Enter username" required autofocus />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Enter password" required />
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>

            </form>

            <p class="mt-3 text-center">
                Don't have an account? <a th:href="@{/register}">Register here</a>
            </p>

        </div>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>

</body>
</html>
