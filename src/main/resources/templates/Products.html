<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>

<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container mt-4">

    <h2>Products</h2>
    <p class="text-muted">
        Total: <span th:text="${total}">0</span> products
    </p>

    <!-- SEARCH -->
    <form method="get" th:action="@{/products}" class="row mb-3">

        <div class="col-md-4">
            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Search products..."
                   th:value="${search}">
        </div>

        <div class="col-md-2">
            <select name="sort" class="form-control">
                <option value="name" th:selected="${sort == 'name'}">Name</option>
                <option value="id" th:selected="${sort == 'id'}">ID</option>
            </select>
        </div>

        <div class="col-md-2">
            <select name="direction" class="form-control">
                <option value="ASC" th:selected="${direction == 'ASC'}">Ascending</option>
                <option value="DESC" th:selected="${direction == 'DESC'}">Descending</option>
            </select>
        </div>

        <div class="col-md-2">
            <select name="size" class="form-control">
                <option value="10" th:selected="${size == 10}">10</option>
                <option value="25" th:selected="${size == 25}">25</option>
                <option value="50" th:selected="${size == 50}">50</option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Search</button>
        </div>

    </form>


    <!-- TABLE -->

    <table class="table table-striped">

        <thead>
        <tr>
            <!-- SORTABLE COLUMN HEADERS -->
            <th>
                <a th:href="@{/products(search=${search},page=${currentPage},size=${size},sort='id',direction=${direction=='ASC'?'DESC':'ASC'})}">ID</a>
            </th>
            <th>
                <a th:href="@{/products(search=${search},page=${currentPage},size=${size},sort='name',direction=${direction=='ASC'?'DESC':'ASC'})}">Name</a>
            </th>
            <th>Description</th>
            <th>
                <a th:href="@{/products(search=${search},page=${currentPage},size=${size},sort='category',direction=${direction=='ASC'?'DESC':'ASC'})}">Category</a>
            </th>
            <th>
                <a th:href="@{/products(search=${search},page=${currentPage},size=${size},sort='price',direction=${direction=='ASC'?'DESC':'ASC'})}">Price</a>
            </th>
            <th>
                <a th:href="@{/products(search=${search},page=${currentPage},size=${size},sort='inStock',direction=${direction=='ASC'?'DESC':'ASC'})}">In Stock</a>
            </th>
            <th>
                <a th:href="@{/products(search=${search},page=${currentPage},size=${size},sort='createdAt',direction=${direction=='ASC'?'DESC':'ASC'})}">Created</a>
            </th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="product : ${products}">
            <td th:text="${product.id}">1</td>
            <td th:text="${product.name}">Product</td>
            <!-- TRUNCATE LONG DESCRIPTIONS -->
            <td th:text="${#strings.abbreviate(product.description, 50)}">Description</td>
            <td th:text="${product.category}">Category</td>
            <td th:text="'$' + ${product.price}">0.00</td>
            <td th:text="${product.inStock}">0</td>
            <!-- FORMAT TIMESTAMP -->
            <td th:text="${#temporals.format(product.createdAt, 'MMM dd, yyyy')}">Date</td>
            <!-- EDIT AND DELETE ACTIONS PER ROW -->
            <td>
                <span sec:authorize="hasAnyRole('ADMIN', 'STAFF')">
                    <a th:href="@{/edit-product/{id}(id=${product.id})}" class="btn btn-warning btn-sm me-1">Edit</a>
                    <form method="post" th:action="@{/products/delete/{id}(id=${product.id})}" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </span>
            </td>
        </tr>

        <tr th:if="${products.isEmpty()}">
            <td colspan="8" class="text-center">No products found</td>
        </tr>

        </tbody>

    </table>


    <!-- PAGINATION -->

    <div class="d-flex justify-content-between">

        <div>
            Showing <span th:text="${startIndex}"></span>
            to <span th:text="${endIndex}"></span>
            of <span th:text="${total}"></span>
        </div>


        <div>

            <a class="btn btn-outline-secondary btn-sm"
               th:if="${hasPrevious}"
               th:href="@{/products(search=${search},page=${currentPage-1},size=${size},sort=${sort},direction=${direction})}">
                Previous
            </a>


            <span class="mx-2">
                Page <span th:text="${currentPage+1}"></span>
                of <span th:text="${totalPages}"></span>
            </span>


            <a class="btn btn-outline-secondary btn-sm"
               th:if="${hasNext}"
               th:href="@{/products(search=${search},page=${currentPage+1},size=${size},sort=${sort},direction=${direction})}">
                Next
            </a>

        </div>

    </div>

</div>

<div th:insert="fragments/base :: assetsScripts"></div>

</body>
</html>
